<!DOCTYPE html>
<html>
  
  <head>
    <title>Journal 4</title>
  </head>
  
  <body>
    <h3>But wait, what about video/audio ?</h3>
    <p>Video is another simple process in html.<br />
      You all you need is the &lt;video&gt; and &lt;audio&gt;<br />
      tags. Inside of each is the &lt;source&gt; tag.<br />
      This leads the mother tag to the source of the video so<br />
      it can be displayed.
    </p>
    <hr />
    <p>Here's some audio</p>
    <audio controls>
      <source src="ths.mp3" type="audio/mpeg">
    </audio>
    <hr />
    <p>How about some video</p>
    <video controls>
      <source src="th.mp4" type="video/mpeg">
    </video>
    <hr />
  </body>
  
</html>
