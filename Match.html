<html>

  <head>
    <title>Match</title>
    <style>
      body {
        background-image: url('https://media.istockphoto.com/id/1208399813/vector/green-grass-realistic-textured-background.jpg?s=612x612&w=0&k=20&c=MTAsrb2AjDM3SMZRgq4771KLS-OfUgEP0CO4kKzXKbE=');
      }

    </style>
    <script>
      var i;

      function newPerson() {
        //create random number
        i = Math.floor(Math.random() * 6);

        //Choose photo depending on number
        if (i == 0) {
          document.getElementById("person").src = "Screenshot 2022-12-09 12.05.21 PM";
        }

        if (i == 1) {
          document.getElementById("person").src = "Screenshot 2022-12-09 12.01.01 PM";
        }
        
        if (i == 2) {
          document.getElementById("person").src = "Screenshot 2022-12-09 11.55.27 AM";
        }
        
        if (i == 3) {
          document.getElementById("person").src = "Screenshot 2022-12-09 11.38.07 AM";
        }

        if (i == 4) {
          document.getElementById("person").src = "Screenshot 2022-12-09 11.44.50 AM";
        }

        if (i == 5) {
          document.getElementById("person").src = "Screenshot 2022-12-09 10.48.13 AM";
        }


      }

    </script>
  </head>

  <body>
    <center>
      <h1>Match Maker 3000</h1>
      <table>
        <tr>
          <td><img src="https://media.tenor.com/UnFx-k_lSckAAAAM/amalie-steiness.gif" id="person" width="200" height="300"></td>
        </tr>
        <tr>
          <td>
            <center><input type="button" onclick="newPerson()" value="FIND" /></center>
          </td>
        </tr>
      </table>
    </center>
  </body>

</html>
