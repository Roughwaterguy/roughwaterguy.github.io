<html>

  <head>
    <title>Match</title>
    <style>
      body {
        background-image: url('https://i.etsystatic.com/5251483/r/il/95dbda/1292334771/il_fullxfull.1292334771_h0r9.jpg');
      }

    </style>
    <script>
      var i;

      function newPerson() {
        //create random number
        i = Math.floor(Math.random() * 6);

        //Choose photo depending on number
        if (i == 0) {
          document.getElementById("person").src = "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxzZWFyY2h8M3x8cmFuZG9tJTIwcGVvcGxlfGVufDB8fDB8fA%3D%3D&w=1000&q=80";
        }

        if (i == 1) {
          document.getElementById("person").src = "https://pbs.twimg.com/media/D8dDZukXUAAXLdY.jpg";
        }
        
        if (i == 2) {
          document.getElementById("person").src = "https://static.boredpanda.com/blog/wp-content/uploads/2017/04/Virrappan2-58f79980ae6fb__880.jpg";
        }
        
        if (i == 3) {
          document.getElementById("person").src = "https://upload.wikimedia.org/wikipedia/en/thumb/0/03/Walter_White_S5B.png/220px-Walter_White_S5B.png";
        }

        if (i == 4) {
          document.getElementById("person").src = "https://www.looper.com/img/gallery/this-is-what-peter-weller-has-been-up-to-since-robocop/intro-1620185574.jpg";
        }

        if (i == 5) {
          document.getElementById("person").src = "https://upload.wikimedia.org/wikipedia/en/4/4d/Shrek_%28character%29.png";
        }


      }

    </script>
  </head>

  <body>
    <center>
      <h1>Match Maker 3000</h1>
      <table>
        <tr>
          <td><img src="https://media.tenor.com/UnFx-k_lSckAAAAM/amalie-steiness.gif" id="person"></td>
        </tr>
        <tr>
          <td>
            <center><input type="button" onclick="newPerson()" value="FIND" /></center>
          </td>
        </tr>
      </table>
    </center>
  </body>

</html>
